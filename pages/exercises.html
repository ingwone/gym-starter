  function renderExercises(filter) {
    const wrap = document.getElementById('exercisesWrap');
    wrap.innerHTML = '';
    Object.entries(EXERCISES).forEach(([key, section]) => {
      if (filter !== 'all' && key !== filter) return;
      const div = document.createElement('div');
      div.className = 'muscle-section';
      div.id = key;
      div.innerHTML = `
        <div class="muscle-section-header">
          <h2 class="muscle-section-title">${section.emoji} ${section.label}</h2>
          <span class="muscle-section-count">${section.items.length}가지</span>
        </div>
        <div class="exercise-grid">
          ${section.items.map((ex, i) => `
            <div class="exercise-card" onclick="openModal('${key}', ${i})">
              <div class="ex-thumb">
                ${ex.gifUrl
                  ? `<img src="${ex.gifUrl}" alt="${ex.name}" loading="lazy">`
                  : `<span class="ex-thumb-placeholder">${ex.emoji}</span>`}
              </div>
              <div class="ex-body">
                <div class="ex-tags">
                  <span class="ex-tag ex-tag-equipment">${ex.equipment}</span>
                  <span class="ex-tag ex-tag-type">${ex.type}</span>
                </div>
                <div class="ex-name">${ex.name}</div>
                <div class="ex-summary">${ex.summary}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      wrap.appendChild(div);
    });
  }

  function openModal(muscleKey, idx) {
    const ex = EXERCISES[muscleKey].items[idx];
    document.getElementById('modalThumb').innerHTML = ex.gifUrl
      ? `<img src="${ex.gifUrl}" alt="${ex.name}">`
      : ex.emoji;
    document.getElementById('modalTags').innerHTML =
      `<span class="ex-tag ex-tag-equipment">${ex.equipment}</span><span class="ex-tag ex-tag-type">${ex.type}</span>`;
    document.getElementById('modalTitle').textContent = ex.name;
    document.getElementById('modalTips').innerHTML =
      ex.tips.map(t => `<li><span class="tip-dot">✓</span><span>${t}</span></li>`).join('');
    const warnBox = document.getElementById('modalWarning');
    if (ex.warning) {
      document.getElementById('modalWarningText').textContent = ex.warning;
      warnBox.style.display = 'block';
    } else {
      warnBox.style.display = 'none';
    }
    document.getElementById('modalYt').href =
      `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.ytQuery)}`;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  document.querySelectorAll('.ftab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderExercises(btn.dataset.filter);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  const hashMap = { '#chest':'chest','#back':'back','#shoulder':'shoulder','#triceps':'triceps','#biceps':'biceps','#leg':'leg','#core':'core' };
  const initFilter = hashMap[window.location.hash] || 'all';
  if (initFilter !== 'all') {
    document.querySelectorAll('.ftab').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === initFilter);
    });
  }
  renderExercises(initFilter);
  </script>
  <script src="../js/main.js"></script>
